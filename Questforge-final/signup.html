<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QuestForge</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- NAVBAR -->
<header class="navbar">
    <a href="#home" class="brand">
        <img src="pixelated logo.png" alt="QuestForge Logo" class="nav-logo" />
        <span>QUESTFORGE</span>
    </a>

    <nav class="nav-menu">
        <a href="index.html#home">Home</a>
        <a href="index.html#trial-game">Trial Game</a>
        <a href="index.html#system-preview">System Preview</a>
        <a href="index.html#features">Features</a>
        <a href="index.html#developers">Developers</a>
    </nav>

    <div class="nav-actions">
        
    </div>

</header>

        <main class="login-wrapper">
            
            <div class="panel login-panel">
                <div class="panel-header" style="justify-content: center; font-size: 1.3rem;">
                    Sign Up
                </div>
                <div class="panel-content">
                    <form action="#" class="login-form" id="signupForm">
                        
                        <div class="form-group">
                            <label for="new-email">Email Address</label>
                            <input type="email" id="new-email" placeholder="hero@questforge.com" required>
                        </div>

                        <div class="form-group">
                            <label for="new-username">Hero Name</label>
                            <input type="text" id="new-username" placeholder="Choose a username" required>
                        </div>

                        <div class="form-group">
                            <label for="new-password">Password</label>
                            <input type="password" id="new-password" placeholder="••••••••" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="confirm-password">Confirm Password</label>
                            <input type="password" id="confirm-password" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-gold login-btn-submit">Sign Up</button>

                        <div class="login-footer-links" style="justify-content: center; gap: 10px; margin-top: 20px;">
                            <span class="text-muted">Already have an account?</span>
                            <a href="login.html?redirect=download.html" style="font-weight: bold; color: var(--gold-light);">Log In</a>
                        </div>

                    </form>
                </div>
            </div>
        </main>
    </div>


    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const signupForm = document.getElementById("signupForm");

        if (signupForm) {
            signupForm.addEventListener("submit", function (e) {
                // 1. Prevent the default form refresh
                e.preventDefault();

                // 2. Grab the input values
                const username = document.getElementById("new-username").value;
                const password = document.getElementById("new-password").value;
                const confirmPassword = document.getElementById("confirm-password").value;

                // 3. Basic Validation: Check if passwords match
                if (password !== confirmPassword) {
                    alert("⚠️ The passwords do not match, Hero! Re-check your scrolls.");
                    return;
                }

                // 4. Success Simulation
                // In a real app, you'd send this data to a database here.
                console.log(`Creating account for: ${username}`);
                
                // Optional: Change button text to show progress
                const submitBtn = signupForm.querySelector(".login-btn-submit");
                submitBtn.innerText = "Forging Account...";
                submitBtn.style.opacity = "0.7";
                submitBtn.disabled = true;

                // 5. Redirect to the download page after a short delay (for effect)
                setTimeout(() => {
                    window.location.href = "download.html";
                }, 1200);
            });
        }
    });
</script>
    </script>
    <footer class="footer-slim">
    <div class="footer-left">
        <div class="footer-logo-small">QUESTFORGE</div>
        <p>&copy; 2026. All rights reserved.</p>
    </div>

    <div class="footer-socials">
        <a href="#">Instagram</a>
        <a href="#">Twitter</a>
        <a href="#">Facebook</a>
    </div>

    <div class="footer-right">
        <a href="contact.html">Contact Us</a>
        <a href="privacy.html">Privacy</a>
    </div>
    </footer>
</body>
</html>
