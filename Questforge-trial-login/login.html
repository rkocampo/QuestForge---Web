<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QuestForge</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- NAVBAR -->
<header class="navbar">
    <a href="#home" class="brand">
        <img src="pixelated logo.png" alt="QuestForge Logo" class="nav-logo" />
        <span>QUESTFORGE</span>
    </a>

    <nav class="nav-menu">
        <a href="index.html#home">Home</a>
        <a href="index.html#trial-game">Trial Game</a>
        <a href="index.html#system-preview">System Preview</a>
        <a href="index.html#features">Features</a>
        <a href="index.html#developers">Developers</a>
    </nav>

    <div class="nav-actions">
        <a href="download.html" class="nav-download-btn">Download</a>
    </div>
</header>
        <main class="login-wrapper">
            
            <div class="panel login-panel">
                <div class="panel-header" style="justify-content: center; font-size: 1.3rem;">
                    Enter the Realm
                </div>
                <div class="panel-content">
                    <form action="#" class="login-form" id="loginForm">
                        
                        <div class="form-group">
                            <label for="username">Hero Name</label>
                            <input type="text" id="username" placeholder="Enter your username" required>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-gold login-btn-submit">Login</button>

                        <div class="login-footer-links">
                            <a href="#">Forgot Password?</a>
                            <a href="signup.html">Create an Account</a>
                        </div>

                    </form>
                </div>
            </div>
        </main>
    </div>


    <script>
     const loginForm = document.getElementById("loginForm"); // Ensure your <form id="loginForm"> matches this

    if (loginForm) {
        loginForm.addEventListener("submit", function (e) {
            e.preventDefault(); // Prevents the form from refreshing the page
            
            // You can add validation logic here later
            
            window.location.href = "download.html"; // Redirects to your target page
        });
    }
    </script>
    <footer class="footer-slim">
    <div class="footer-left">
        <div class="footer-logo-small">QUESTFORGE</div>
        <p>&copy; 2026. All rights reserved.</p>
    </div>

    <div class="footer-socials">
        <a href="#">Instagram</a>
        <a href="#">Twitter</a>
        <a href="#">Facebook</a>
    </div>

    <div class="footer-right">
        <a href="contact.html">Contact Us</a>
        <a href="privacy.html">Privacy</a>
    </div>
    </footer>
</body>
</html>
