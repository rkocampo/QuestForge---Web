<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QuestForge</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="common.css">
</head>
<body>

    <div class="container">
    <nav>
        <div class="nav-left">
            <a href="#"><img src="pixelated logo.png" class="nav-logo-img" alt="Logo"></a>
            <span class="questforge-text">QUESTFORGE</span>
        </div>

    <ul class="nav-links">
        <li><a href="index.html#home">Home</a></li>
        <li><a href="index.html#features">Features</a></li>
        <li><a href="index.html#how-it-works">How it Works</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#contact">Contact</a></li>
    </ul>

    <div class="nav-login">
        <a href="login.html" class="btn btn-gold">Login</a>
    </div>
        
    </nav>

        <main class="login-wrapper">
            <a href="index.html" class="btn-back">⬅ Back to Realm</a>
            
            <div class="panel login-panel">
                <div class="panel-header" style="justify-content: center; font-size: 1.3rem;">
                    Sign Up
                </div>
                <div class="panel-content">
                    <form action="#" class="login-form">
                        
                        <div class="form-group">
                            <label for="new-email">Email Address</label>
                            <input type="email" id="new-email" placeholder="hero@questforge.com" required>
                        </div>

                        <div class="form-group">
                            <label for="new-username">Hero Name</label>
                            <input type="text" id="new-username" placeholder="Choose a username" required>
                        </div>

                        <div class="form-group">
                            <label for="new-password">Password</label>
                            <input type="password" id="new-password" placeholder="••••••••" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="confirm-password">Confirm Password</label>
                            <input type="password" id="confirm-password" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-gold login-btn-submit">Sign Up</button>

                        <div class="login-footer-links" style="justify-content: center; gap: 10px; margin-top: 20px;">
                            <span class="text-muted">Already have an account?</span>
                            <a href="login.html" style="font-weight: bold; color: var(--gold-light);">Log In</a>
                        </div>

                    </form>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
