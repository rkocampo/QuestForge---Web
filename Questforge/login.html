<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QuestForge</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="common.css">
</head>
<body>

    <div class="container">
       <nav>
            <div class="logo">QUESTFORGE</div>
            
             <div class="nav-links">
                <a href="#home">Home</a>
                <a href="#features">Features</a>
                <a href="#how-it-works">How It Works</a> 
                <a href="#about">About Us</a>
                <a href="#developers">Developers</a>
            </div>

            <div class="nav-login">
                <a href="login.html" class="btn btn-gold">Login</a>
            </div>
        </nav>

        <main class="login-wrapper">
            
            <a href="index.html" class="btn-back">⬅ Back to Realm</a>

            <div class="panel login-panel">
                <div class="panel-header" style="justify-content: center; font-size: 1.3rem;">
                    Enter the Realm
                </div>
                <div class="panel-content">
                    <form action="#" class="login-form">
                        
                        <div class="form-group">
                            <label for="username">Hero Name</label>
                            <input type="text" id="username" placeholder="Enter your username" required>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-gold login-btn-submit">Login</button>

                        <div class="login-footer-links">
                            <a href="#">Forgot Password?</a>
                            <a href="signup.html">Create an Account</a>
                        </div>

                    </form>
                </div>
            </div>
        </main>

        <footer>
            <div class="footer-logo">QUESTFORGE</div>
            <p>&copy; 2026 QuestForge. All rights reserved.</p>
        </footer>
    </div>

</body>
</html>
