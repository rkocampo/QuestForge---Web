<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Complete - QuestForge</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .download-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        /* Reverting to your fixed Panel design */
        .success-card {
            background-color: var(--panel-bg, #0b152e);
            border: 2px solid var(--accent-blue, #2b4b8a);
            border-radius: 20px;
            padding: 50px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }

        .icon-check {
            width: 80px;
            height: 80px;
            background: var(--gold-main, #dca820);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 40px;
            color: #111;
            box-shadow: 0 0 20px rgba(220, 168, 32, 0.5);
            transition: all 0.5s ease;
        }

        /* Text status styles */
        #download-status {
            font-size: 1.1rem;
            color: var(--gold-light);
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 20px 0 30px 0;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%; /* Start at zero */
            height: 100%;
            background: var(--gold-light, #fce07d);
            transition: width 4s linear; /* The "Slow" speed you asked for */
        }

        /* Hidden Button effect */
        #return-btn {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #return-btn.show {
            opacity: 1;
            pointer-events: auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="download-wrapper">
        <div class="success-card">
            <div class="icon-check" id="status-icon">?</div>
            
            <h1 class="gold-heading" id="main-title">Forging QuestForge...</h1>
            
            <p id="download-status">Downloading</p>

            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>

            <p id="completion-msg" style="color: #8a9bbd; line-height: 1.6;">
                Preparing your academic tools. Please do not close the realm.
            </p>

            <div id="return-btn">
                <a href="index.html" class="btn btn-gold" style="margin-top: 30px;">Return to Home</a>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const bar = document.getElementById('progress-bar');
            const statusText = document.getElementById('download-status');
            const title = document.getElementById('main-title');
            const message = document.getElementById('completion-msg');
            const btn = document.getElementById('return-btn');
            const icon = document.getElementById('status-icon');

            // Start the loading
            setTimeout(() => {
                bar.style.width = '100%';
            }, 300);

            // Change to "Downloaded" when full (4 seconds later)
            setTimeout(() => {
                statusText.innerText = "Downloaded";
                statusText.style.color = "#4CAF50"; // Green text for success
                title.innerText = "Forge Completed!";
                message.innerText = "Questforge has been officially downloaded..";
                icon.innerText = "✓"; // Swaps the question mark for a check
                btn.classList.add('show'); 
            }, 4300);
        };
    </script>

</body>
</html>
