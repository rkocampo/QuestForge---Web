<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Profile - QuestForge</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="profile.css">
    <style>
        /* Specific styles for this page only */
        .profile-detail-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            text-align: center;
        }

        .decorative-img {
            width: 100%;
            max-width: 1400px;
            height: 700px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 30px 0;
            border: 2px solid var(--accent-blue);
        }

        .back-nav {
            position: absolute;
            top: 30px;
            left: 30px;
        }

        .back-link {
            color: var(--gold-light);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            border: 1px solid var(--gold-light);
            padding: 10px 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: var(--gold-light);
            color: var(--bg-dark);
        }

        .hero-info-text {
            max-width: 700px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    
    <div class="back-nav">
        <a href="index.html#profile" class="back-link">← Back to Realm</a>
    </div>
    
    <div class="profile-detail-wrapper">

        <div class="hero-info-text">
            <h1 class="gold-heading">Hero Mastery</h1>
            <p class="profile-description">Here you can view your full character profile details.</p>
        </div> 

        <img src="profile1.png" alt="Hero Banner Top" class="decorative-img">

    
        <img src="profile2.png" alt="Hero Stats Bottom" class="decorative-img">

    </div>

</body>
</html>
